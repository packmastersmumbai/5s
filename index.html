<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PackMasters 5S</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0F172A;
    }
    .clip {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    iframe {
      border: none;
      width: 100%;
      /* Negative top margin hides the GAS banner (~68px); extra height clips the footer */
      margin-top: -68px;
      height: calc(100vh + 120px);
      display: block;
    }
    #splash {
      position: fixed; inset: 0;
      background: #0F172A;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 9;
      transition: opacity 0.4s;
    }
    #splash.gone { opacity: 0; pointer-events: none; }
    .sp-logo  { font-size: 48px; }
    .sp-title { color: #fff; font-family: system-ui, sans-serif; font-size: 20px; font-weight: 700; }
    .sp-sub   { color: rgba(255,255,255,0.55); font-family: system-ui, sans-serif; font-size: 13px; }
    .sp-spin  {
      width: 36px; height: 36px; margin-top: 4px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">🏭</div>
  <div class="sp-title">PackMasters 5S</div>
  <div class="sp-sub">Lean Manufacturing QMS</div>
  <div class="sp-spin"></div>
</div>

<div class="clip">
  <iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbyYsCQfJvhorJglpwmpfYNt65659sM5HWKztNK1n5tzeB5wyaovrLpMRDYg95d6yKgQHg/exec"
    allowfullscreen
    onload="document.getElementById('splash').classList.add('gone')"
  ></iframe>
</div>

</body>
</html>
